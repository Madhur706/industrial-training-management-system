<!DOCTYPE html>
<html>
<head>

    <title>Upload Report</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
        }
        .back-btn{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 20px;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.back-btn:hover{
    background:#084298;
}

    </style>

</head>
<body>
<a href="javascript:history.back()" class="back-btn">
    ← Back
</a>
<div class="box">

    <h1>
        Upload Report
    </h1>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <input type="text" name="student_name" placeholder="Student Name">

        <input type="file" name="report_file">

        <button type="submit">
            Upload
        </button>

    </form>

</div>

</body>
</html>
