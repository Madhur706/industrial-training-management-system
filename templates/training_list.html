<!DOCTYPE html>
<html>
<head>

    <title>Training List</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
            padding:40px;
        }

        h1{
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        table th, table td{
            border:1px solid #ddd;
            padding:15px;
            text-align:center;
        }

        th{
            background:#0d6efd;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }
table a{
    text-decoration:none;
    padding:8px 14px;
    border-radius:5px;
    color:white;
    background:#0d6efd;
}
input{
    padding:10px;
    width:250px;
}

button{
    padding:10px 20px;
    background:#0d6efd;
    color:white;
    border:none;
}
.delete-btn{
    background:red;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:5px;
}
.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    z-index:1000;
}

.back-btn:hover{
    background:#084298;
    transform:scale(1.08);
}
    </style>


</head>
<body>
<a href="javascript:history.back()" class="back-btn">
    ← 
</a>
<h1>
    Student Training Applications
</h1>
<form method="GET">

    <input type="text" name="search" placeholder="Search Student">

    <button type="submit">
        Search
    </button>

</form>

<br><br>

<table>

    <tr>

        <th>ID</th>
        <th>Student Name</th>
        <th>Email</th>
        <th>Company</th>
        <th>Technology</th>
        <th>Duration</th>
        <th>Status</th>
        <th>Action</th>
        <th>Delete</th>
    </tr>

    {% for i in trainings %}

    <tr>

        <td>{{ i.id }}</td>
        <td>{{ i.student_name }}</td>
        <td>{{ i.email }}</td>
        <td>{{ i.company_name }}</td>
        <td>{{ i.technology }}</td>
        <td>{{ i.duration }}</td>
        <td>{{ i.status }}</td>

<td>

    <a href="{% url 'approve_training' i.id %}">
        Approve
    </a>

    |

    <a href="{% url 'reject_training' i.id %}">
        Reject
    </a>

</td>

<td>

   <a href="{% url 'delete_training' i.id %}" class="delete-btn">
    Delete
</a>

</td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
