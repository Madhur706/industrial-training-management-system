<!DOCTYPE html>
<html>
<head>

    <title>Certificates</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
            padding:40px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #ddd;
            padding:15px;
            text-align:center;
        }

        th{
            background:#0d6efd;
            color:white;
        }

        a{
            text-decoration:none;
            color:#0d6efd;
        }
/* TOP LEFT AERO BACK BUTTON */

.back-btn{
    position:fixed;
    top:90px;
    left:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#0d6efd;
    font-size:34px;
    font-weight:bold;
    transition:0.3s;
    z-index:1000;
}

.back-btn:hover{
    transform:translateY(-5px) scale(1.08);
    background:#0d6efd;
    color:white;
    box-shadow:0 12px 30px rgba(13,110,253,0.35);
}
    </style>

</head>
<body>
<!-- BACK BUTTON -->

<a href="{% url 'student_dashboard' %}" class="back-btn">
    ←
</a>
<h1>
    Certificates
</h1>

<table>

    <tr>

        <th>ID</th>
        <th>Student Name</th>
        <th>Certificate</th>

    </tr>

    {% for i in certificates %}

    <tr>

        <td>{{ i.id }}</td>

        <td>{{ i.student_name }}</td>

        <td>

            <a href="{{ i.certificate_file.url }}">
                Download
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
