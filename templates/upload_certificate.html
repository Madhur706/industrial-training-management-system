<!DOCTYPE html>
<html>
<head>

    <title>Upload Certificate</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
        }
       .back-btn{
    position:fixed;
    top:20px;
    left:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
    z-index:1000;
}

.back-btn:hover{
    background:#084298;
    transform:scale(1.08);
}

    </style>

</head>
<body>
<a href="{% url 'admin_dashboard' %}" class="back-btn">
    ←
</a>
<div class="box">

    <h1>
        Upload Certificate
    </h1>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <input type="text" name="student_name" placeholder="Student Name">

        <input type="file" name="certificate_file">

        <button type="submit">
            Upload
        </button>

    </form>

</div>

</body>
</html>
