<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f7fb;
}

/* NAVBAR */

nav{
    width:100%;
    background:#0d6efd;
    padding:18px 70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
    transition:0.3s;
}

.menu a:hover{
    color:yellow;
}

/* REGISTER FORM */

.container{
    width:100%;
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.box h1{
    text-align:center;
    margin-bottom:30px;
    color:#222;
}

input,
select{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#084298;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#0d6efd;
    text-decoration:none;
}

</style>

</head>
<body>

<!-- NAVBAR -->

<nav>

    <div class="logo">
        ITMS
    </div>

    <div class="menu">

        <a href="{% url 'index' %}">
            Home
        </a>

        <a href="{% url 'about' %}">
            About
        </a>

        <a href="{% url 'login' %}">
            Login
        </a>

        <a href="{% url 'register' %}">
            Register
        </a>

        <a href="{% url 'contact' %}">
            Contact
        </a>

    </div>

</nav>

<!-- REGISTER FORM -->

<div class="container">

    <div class="box">

        <h1>
            Register
        </h1>
{% if messages %}

    {% for message in messages %}

        <p style="color:rgb(61, 177, 77); margin-bottom:15px;">
            {{ message }}
        </p>

    {% endfor %}

{% endif %}
        <form method="POST">

            {% csrf_token %}

            <input type="text" name="name" placeholder="Enter Name">

            <input type="email" name="email" placeholder="Enter Email">

            <input type="password" name="password" placeholder="Enter Password">

            <input type="password" name="confirm_password" placeholder="Confirm Password">

            <select name="role">

                <option value="Student">
                    Student
                </option>

                <option value="Trainer">
                    Trainer
                </option>

            </select>

            <button type="submit">
                Register
            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
