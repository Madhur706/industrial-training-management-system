<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f7fb;
}

/* NAVBAR */

nav{
    width:100%;
    background:#0d6efd;
    padding:18px 70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
    transition:0.3s;
}

.menu a:hover{
    color:yellow;
}

/* CONTACT SECTION */

.contact{
    width:100%;
    padding:80px;
}

.contact h1{
    text-align:center;
    font-size:50px;
    color:#222;
    margin-bottom:20px;
}

.contact p{
    text-align:center;
    font-size:22px;
    color:#666;
    margin-bottom:50px;
}

/* FORM */

.form-box{
    width:500px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

.form-box textarea{
    height:150px;
    resize:none;
}

.form-box button{
    width:100%;
    padding:15px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.form-box button:hover{
    background:#084298;
}

/* CONTACT INFO */

.info{
    margin-top:60px;
    text-align:center;
}

.info h2{
    color:#0d6efd;
    margin-bottom:15px;
}

.info p{
    font-size:18px;
    margin-bottom:10px;
}

/* FOOTER */

footer{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:60px;
}

</style>

</head>
<body>

<!-- NAVBAR -->

<nav>

    <div class="logo">
        ITMS
    </div>

    <div class="menu">

        <a href="{% url 'index' %}">
            Home
        </a>

        <a href="{% url 'about' %}">
            About
        </a>

        <a href="{% url 'contact' %}">
            Contact
        </a>

        <a href="{% url 'login' %}">
            Login
        </a>

        <a href="{% url 'register' %}">
            Register
        </a>

    </div>

</nav>

<!-- CONTACT SECTION -->

<section class="contact">

    <h1>
        Contact Us
    </h1>

    <p>
        Feel free to contact us for any training related queries.
    </p>

    <div class="form-box">

        <form>

            <input type="text" placeholder="Enter Your Name">

            <input type="email" placeholder="Enter Your Email">

            <textarea placeholder="Enter Your Message"></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

    <div class="info">

        <h2>
            Contact Information
        </h2>

        <p>Email: support@itms.com</p>

        <p>Phone: +91 9876543210</p>

        <p>Address: Industrial Training Department</p>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <h3>
        Industrial Training Management System
    </h3>

</footer>

</body>
</html>
