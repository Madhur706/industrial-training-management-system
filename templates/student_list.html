<!DOCTYPE html>
<html>
<head>

<title>
    Students List
</title>

<style>

body{
    font-family:Arial;
    background:#eef2f7;
    padding:40px;
}

h1{
    margin-bottom:30px;
    color:#0d6efd;
    font-size:45px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th{
    background:#0d6efd;
    color:white;
    padding:18px;
    font-size:20px;
}

td{
    padding:18px;
    text-align:center;
    border-bottom:1px solid #ddd;
    font-size:18px;
}

tr:hover{
    background:#f4f7fb;
}

/* BACK BUTTON */

.back-btn{
    position:fixed;
    top:90px;
    left:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:white;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#0d6efd;
    font-size:34px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#0d6efd;
    color:white;
}

</style>

</head>
<body>

<!-- BACK BUTTON -->

<a href="{% url 'admin_dashboard' %}" class="back-btn">
    ←
</a>

<h1>
    Registered Students
</h1>

<table>

<tr>

    <th>ID</th>

    <th>Name</th>

    <th>Email</th>

    <th>Role</th>

</tr>

{% for student in students %}

<tr>

    <td>
        {{ student.id }}
    </td>

    <td>
        {{ student.name }}
    </td>

    <td>
        {{ student.email }}
    </td>

    <td>
        {{ student.role }}
    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
