<!DOCTYPE html>
<html>
<head>

    <title>Student Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            display:flex;
            background:#f4f7fb;
        }

        /* SIDEBAR */

        .sidebar{
            width:250px;
            height:100vh;
            background:#0d6efd;
            padding:30px 20px;
            position:fixed;
        }

        .sidebar h2{
            color:white;
            text-align:center;
            margin-bottom:40px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px;
            margin-bottom:10px;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:white;
            color:#0d6efd;
        }

        /* MAIN CONTENT */

        .main{
            margin-left:250px;
            width:100%;
            padding:40px;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:40px;
        }

        .top h1{
            color:#222;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card h2{
            color:#0d6efd;
            margin-bottom:15px;
        }

        .card p{
            color:#555;
            line-height:1.6;
        }

    </style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h2>
        Student Panel
    </h2>

    <a href="{% url 'profile' %}">
    Profile
</a>

   <a href="{% url 'apply_training' %}">
    Apply Training
</a>
<a href="{% url 'attendance_list' %}">
    Attendance
</a>

   
    <a href="{% url 'certificate_list' %}">
    Certificates
</a>

    <a href="{% url 'logout' %}">
    Logout
</a>

</div>

<!-- MAIN -->

<div class="main">

    <div class="top">

        <h1>
            Welcome Student
        </h1>

    </div>

    <div class="cards">

        <div class="card">

            <h2>
                Training Status
            </h2>

            <p>
                Check your industrial training approval status.
            </p>

        </div>

        <div class="card">

            <h2>
                Attendance
            </h2>

            <p>
                View your complete attendance records here.
            </p>

        </div>

        <div class="card">

            <h2>
                Certificates
            </h2>

            <p>
                Download your training completion certificates.
            </p>

        </div>

    </div>

</div>

</body>
</html>
